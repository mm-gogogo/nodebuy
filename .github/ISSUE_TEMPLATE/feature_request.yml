name: 功能建议
description: 新功能或现有功能的改进想法
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 想解决什么问题
      description: 描述场景与痛点,而不只是方案
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
